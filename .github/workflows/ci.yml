name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci || npm install

      - name: Syntax check
        run: npm run lint:syntax

      - name: Run tests
        env:
          DUCK_ONLY_MODE: '1'
          LOG_LEVEL: 'warn'
        run: npm test

      - name: Validate manifest + service worker
        run: |
          if [ -f manifest.webmanifest ]; then python3 -c "import json; json.load(open('manifest.webmanifest'))"; fi
          if [ -f public/manifest.webmanifest ]; then python3 -c "import json; json.load(open('public/manifest.webmanifest'))"; fi
          node --check sw.js
          node --check safe-dom.js
          node --check pwa-register.js

      - name: Audit deps (no high vulnerabilities)
        run: npm audit --omit=dev --audit-level=high || true

  lint-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate openapi.yaml
        run: |
          if [ -f openapi.yaml ]; then
            python3 -c "import yaml; yaml.safe_load(open('openapi.yaml'))"
          fi
