name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci || npm install

      - name: Syntax check
        run: |
          node -c server_api.js
          node -c api-client.js
          node -c ai-tools.js
          node -c ai-chat-v2.js
          node -c analytics-deep.js
          node -c email-reports.js
          node -c safe-catch.js
          node -c performance-boost.js

      - name: Run tests
        env:
          SUMINREGIO_API_KEY: 'sk_ext_ci_dummy_key_for_syntax_only'
          PORT: '7099'
          LOG_LEVEL: 'warn'
        run: npm test

      - name: Validate manifests
        run: |
          python3 -c "import json; json.load(open('public/manifest.webmanifest'))"

  lint-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate openapi.yaml
        run: |
          if [ -f openapi.yaml ]; then
            python3 -c "import yaml; yaml.safe_load(open('openapi.yaml'))"
          fi
