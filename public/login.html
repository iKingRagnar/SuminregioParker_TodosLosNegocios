<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Iniciar sesión — Suminregio Parker</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:radial-gradient(1200px 800px at 20% 0%,#0f172a 0%,#020617 55%,#000 100%);color:#e2e8f0;padding:1.5rem}
  .card{width:100%;max-width:420px;background:rgba(15,23,42,.88);border:1px solid rgba(230,168,0,.25);border-radius:16px;padding:2rem;box-shadow:0 24px 80px rgba(0,0,0,.45)}
  .brand{display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem}
  .logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#E6A800,#ea580c);display:grid;place-items:center;font-weight:800;color:#fff;font-size:1.1rem}
  h1{font-size:1.15rem;font-weight:700;letter-spacing:-.02em}
  .sub{font-size:.8rem;color:#94a3b8;margin-top:.2rem}
  label{display:block;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;margin:.9rem 0 .35rem}
  input{width:100%;padding:.7rem .85rem;border-radius:10px;border:1px solid rgba(148,163,184,.35);background:#020617;color:#f1f5f9;font-size:.95rem}
  input:focus{outline:2px solid rgba(230,168,0,.45);border-color:#E6A800}
  button{margin-top:1.25rem;width:100%;padding:.85rem;border:none;border-radius:10px;font-weight:700;font-size:.95rem;cursor:pointer;background:linear-gradient(135deg,#E6A800,#ca8a04);color:#0f172a}
  button:disabled{opacity:.55;cursor:not-allowed}
  .err,.hint{margin-top:.85rem;font-size:.82rem;border-radius:8px;padding:.6rem .75rem;display:none}
  .err{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.35);color:#fecaca}
  .hint{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);color:#bfdbfe}
  .foot{margin-top:1.25rem;text-align:center;font-size:.8rem;color:#64748b}
  .foot a{color:#E6A800;text-decoration:none}
  .foot a:hover{text-decoration:underline}
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="logo">SP</div>
      <div>
        <h1>Suminregio Parker</h1>
        <div class="sub">Dashboard ejecutivo — acceso seguro</div>
      </div>
    </div>
    <form id="f" autocomplete="username">
      <label for="email">Correo</label>
      <input id="email" name="email" type="email" required placeholder="usuario@suminregio.com" autocomplete="username">
      <label for="pw">Contraseña</label>
      <input id="pw" name="password" type="password" required autocomplete="current-password">
      <div id="err" class="err"></div>
      <div id="hint" class="hint">Tras iniciar sesión podrás acceder a los módulos autorizados para tu cuenta.</div>
      <button type="submit" id="btn">Entrar</button>
    </form>
    <p class="foot"><a href="/portal.html">← Volver a la portada</a></p>
  </div>
<script>
(function(){
  var params=new URLSearchParams(location.search);
  var next=params.get('next')||'/index.html';
  var err=document.getElementById('err');
  var hint=document.getElementById('hint');
  hint.style.display='block';
  document.getElementById('f').addEventListener('submit',function(ev){
    ev.preventDefault();
    err.style.display='none';
    var btn=document.getElementById('btn');
    btn.disabled=true;
    fetch('/api/auth/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      credentials:'same-origin',
      body:JSON.stringify({
        email:document.getElementById('email').value.trim(),
        password:document.getElementById('pw').value
      })
    }).then(function(r){
      return r.json().then(function(j){return{ok:r.ok,status:r.status,j:j};});
    }).then(function(x){
      btn.disabled=false;
      if(!x.ok){
        err.textContent=(x.j&&x.j.error)||('Error '+x.status);
        err.style.display='block';
        return;
      }
      location.href=next.indexOf('/')===0?next:'/index.html';
    }).catch(function(){
      btn.disabled=false;
      err.textContent='No se pudo conectar. Revisa tu red o vuelve a intentar.';
      err.style.display='block';
    });
  });
})();
</script>
</body>
</html>
