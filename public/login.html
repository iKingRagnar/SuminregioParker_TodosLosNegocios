<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Suminregio — Acceso</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%;height:100%}
  body{
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:#fff;
    color:#111;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:1.25rem;
  }
  .box{
    width:100%;
    max-width:380px;
    border:1px solid #ddd;
    border-radius:8px;
    padding:2rem 2rem 1.75rem;
    box-shadow:0 4px 24px rgba(0,0,0,.06);
  }
  .brand{
    text-align:center;
    margin-bottom:1.75rem;
  }
  .brand h1{
    font-size:1.5rem;
    font-weight:700;
    letter-spacing:-.02em;
  }
  .brand p{
    margin-top:.35rem;
    font-size:.875rem;
    color:#555;
  }
  label{
    display:block;
    font-size:.8125rem;
    font-weight:600;
    margin-bottom:.35rem;
    color:#333;
  }
  .hint{font-weight:400;font-size:.75rem;color:#666;margin-top:.15rem}
  input{
    width:100%;
    padding:.6rem .65rem;
    font-size:1rem;
    border:1px solid #ccc;
    border-radius:4px;
    margin-bottom:1rem;
  }
  input:focus{
    outline:none;
    border-color:#333;
    box-shadow:0 0 0 2px rgba(0,0,0,.08);
  }
  button{
    width:100%;
    margin-top:.25rem;
    padding:.7rem;
    font-size:1rem;
    font-weight:600;
    border:none;
    border-radius:4px;
    background:#111;
    color:#fff;
    cursor:pointer;
  }
  button:disabled{opacity:.5;cursor:not-allowed}
  .err{
    display:none;
    margin:.75rem 0 0;
    padding:.5rem .6rem;
    font-size:.8125rem;
    background:#fef2f2;
    border:1px solid #fecaca;
    border-radius:4px;
    color:#991b1b;
  }
  .foot{
    margin-top:1.25rem;
    text-align:center;
    font-size:.75rem;
    color:#888;
  }
</style>
</head>
<body>
  <div class="box">
    <div class="brand">
      <h1>Suminregio</h1>
      <p>Iniciar sesión</p>
    </div>
    <form id="f" autocomplete="on">
      <label for="email">Usuario</label>
      <span class="hint">Correo de tu cuenta</span>
      <input id="email" name="email" type="email" inputmode="email" required placeholder="correo@suminregio.com" autocomplete="username" autocapitalize="none" spellcheck="false">
      <label for="pw">Contraseña</label>
      <input id="pw" name="password" type="password" required autocomplete="current-password">
      <div id="err" class="err"></div>
      <button type="submit" id="btn">Iniciar sesión</button>
    </form>
  </div>
<script>
(function(){
  var params=new URLSearchParams(location.search);
  var next=params.get('next')||'/index.html';
  var err=document.getElementById('err');
  document.getElementById('f').addEventListener('submit',function(ev){
    ev.preventDefault();
    err.style.display='none';
    var btn=document.getElementById('btn');
    btn.disabled=true;
    fetch('/api/auth/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      credentials:'same-origin',
      body:JSON.stringify({
        email:document.getElementById('email').value.trim(),
        password:document.getElementById('pw').value
      })
    }).then(function(r){
      return r.json().then(function(j){return{ok:r.ok,status:r.status,j:j};});
    }).then(function(x){
      btn.disabled=false;
      if(!x.ok){
        err.textContent=(x.j&&x.j.error)||('Error (código '+x.status+')');
        err.style.display='block';
        return;
      }
      location.href=next.indexOf('/')===0?next:'/index.html';
    }).catch(function(){
      btn.disabled=false;
      err.textContent='No se pudo conectar.';
      err.style.display='block';
    });
  });
})();
</script>
</body>
</html>
