<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Suminregio — Acceso</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:radial-gradient(1000px 700px at 50% -20%,#1e293b 0%,#020617 45%,#000 100%);color:#e2e8f0;padding:2rem}
  .orb{width:88px;height:88px;border-radius:22px;background:linear-gradient(135deg,#E6A800,#ea580c);margin:0 auto 1.5rem;box-shadow:0 0 40px rgba(230,168,0,.35)}
  .brand-name{font-size:clamp(1.75rem,5vw,2.35rem);font-weight:900;letter-spacing:-.04em;color:#f8fafc;max-width:560px;line-height:1.15}
  h1{font-size:clamp(1.05rem,3vw,1.35rem);font-weight:600;letter-spacing:-.02em;max-width:560px;color:#cbd5e1;margin-top:.75rem}
  p{margin-top:1rem;color:#94a3b8;max-width:480px;line-height:1.5;font-size:.95rem}
  .actions{margin-top:2rem;display:flex;flex-wrap:wrap;gap:1rem;justify-content:center}
  a{display:inline-flex;align-items:center;gap:.5rem;padding:.85rem 1.4rem;border-radius:12px;font-weight:700;text-decoration:none}
  .primary{background:linear-gradient(135deg,#E6A800,#ca8a04);color:#0f172a}
  .ghost{border:1px solid rgba(148,163,184,.4);color:#e2e8f0}
  .note{margin-top:2.5rem;font-size:.75rem;color:#64748b;max-width:420px}
</style>
</head>
<body>
  <div class="orb" aria-hidden="true"></div>
  <p class="brand-name">Suminregio</p>
  <h1>Parker · Todos los negocios</h1>
  <p>Ingresa tu usuario (correo) y contraseña para ver el contenido del panel como antes.</p>
  <div class="actions">
    <a class="primary" href="/login.html?next=/index.html">Iniciar sesión</a>
  </div>
  <p class="note">Cuentas por rol: administrador, gerente y vendedor. Si no tienes usuario, solicítalo a TI o administración.</p>
</body>
</html>
