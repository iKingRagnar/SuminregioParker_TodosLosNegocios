openapi: 3.0.3
info:
  title: Suminregio API
  description: |
    API para dashboard ejecutivo de Suminregio Parker (ventas, CXC, inventario,
    contabilidad, consumos, análisis avanzado). Consume DuckDB snapshots.
  version: '9.1'
  contact:
    name: Guillermo Ragnar
servers:
  - url: https://suminregioparker-todoslosnegocios.onrender.com
    description: Producción (Render)
  - url: http://localhost:7000
    description: Desarrollo local

tags:
  - name: Health
  - name: Admin
  - name: Ventas
  - name: CXC
  - name: Inventario
  - name: Resultados
  - name: Analytics
  - name: AI
  - name: Reports

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check ultra-ligero (< 10ms, no toca DB)
      responses:
        '200': { description: OK }

  /api/ping:
    get:
      tags: [Health]
      summary: Estado detallado (memoria, uptime, cache, build)
      responses:
        '200':
          description: JSON con uptime + memory + cache + databases

  /api/admin/mode:
    get:
      tags: [Admin]
      summary: Reporta si el server está en DUCK_ONLY_MODE y qué snapshots hay
      responses:
        '200': { description: Estado del servidor }

  /api/admin/sync/status:
    get:
      tags: [Admin]
      summary: Lista snapshots con edad, tamaño, filas, tablas sincronizadas
      responses:
        '200': { description: Arreglo de snapshots }

  /api/admin/snapshot/upload:
    post:
      tags: [Admin]
      summary: Subir snapshot DuckDB (con validación pre-swap)
      parameters:
        - in: header
          name: X-Snapshot-Token
          required: true
          schema: { type: string }
        - in: header
          name: X-DB-Id
          schema: { type: string, default: default }
      requestBody:
        content:
          application/octet-stream:
            schema: { type: string, format: binary }
      responses:
        '200': { description: Upload OK }
        '401': { description: Token inválido }
        '422': { description: Snapshot corrupto (rechazado) }

  /api/admin/errors:
    get:
      tags: [Admin]
      summary: Últimos N errores capturados (ring buffer en memoria)
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 50, maximum: 200 }
      responses:
        '200': { description: Lista de errores con stack trace }

  /api/ventas/resumen:
    get:
      tags: [Ventas]
      summary: KPIs de ventas (hoy, mes actual, facturas, remisiones)
      parameters:
        - in: query
          name: db
          schema: { type: string, default: default }
      responses:
        '200': { description: Objeto con HOY, MES_ACTUAL, FACTURAS_MES, REMISIONES }

  /api/ventas/diarias:
    get:
      tags: [Ventas]
      summary: Serie diaria del mes actual
      parameters:
        - in: query
          name: db
          schema: { type: string }

  /api/cxc/resumen-aging:
    get:
      tags: [CXC]
      summary: Saldo total + distribución por aging buckets (corriente/30/60/90/+90)
      parameters:
        - in: query
          name: db
          schema: { type: string }

  /api/cxc/vencidas:
    get:
      tags: [CXC]
      summary: Lista de documentos con días vencidos > 0

  /api/cxc/top-deudores:
    get:
      tags: [CXC]
      summary: Top clientes con mayor deuda

  /api/inv/resumen:
    get:
      tags: [Inventario]
      summary: Total de artículos, valor, almacenes

  /api/resultados/pnl:
    get:
      tags: [Resultados]
      summary: Estado de Resultados (P&L)

  /api/resultados/balance-general:
    get:
      tags: [Resultados]
      summary: Balance general con desglose activo/pasivo

  /api/analytics/rfm:
    get:
      tags: [Analytics]
      summary: Segmentación RFM de clientes (Champions, Leales, En Riesgo, Perdidos)

  /api/analytics/pareto:
    get:
      tags: [Analytics]
      summary: Análisis 80/20 de clientes o artículos
      parameters:
        - in: query
          name: dim
          schema: { type: string, enum: [cliente, articulo] }
        - in: query
          name: dias
          schema: { type: integer, default: 365 }

  /api/analytics/clv:
    get:
      tags: [Analytics]
      summary: Customer Lifetime Value estimado a 12 meses

  /api/compare/temporal:
    get:
      tags: [Analytics]
      summary: Comparación MoM y YoY para una o más métricas
      parameters:
        - in: query
          name: metrics
          schema: { type: string, example: 'ventas_mes,cxc_total' }

  /api/search/global:
    get:
      tags: [Analytics]
      summary: Búsqueda unificada (clientes, vendedores, artículos, folios)
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }

  /api/anomalies/check:
    get:
      tags: [Analytics]
      summary: Detecta anomalías de venta diaria (z-score > 2σ)

  /api/forecast/ventas:
    get:
      tags: [Analytics]
      summary: Proyección de ventas N días (regresión lineal + EWMA)
      parameters:
        - in: query
          name: dias
          schema: { type: integer, default: 30, maximum: 180 }

  /api/forecast/inventario:
    get:
      tags: [Analytics]
      summary: Días de cobertura por artículo (top 50 próximos a agotarse)

  /api/ai/ask:
    post:
      tags: [AI]
      summary: NL→SQL determinístico (sin LLM, patrones regex)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                q: { type: string, example: 'ventas de hoy' }

  /api/ai/chat-v2:
    post:
      tags: [AI]
      summary: Chat conversacional con memoria por sesión (Anthropic Claude)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                message: { type: string }
                sessionId: { type: string }
                db: { type: string }

  /api/reports/preview:
    get:
      tags: [Reports]
      summary: HTML del reporte diario (sin enviar email)
      parameters:
        - in: query
          name: db
          schema: { type: string }

  /api/reports/send:
    post:
      tags: [Reports]
      summary: Envío manual de reporte por email
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                to: { type: string, format: email }
                subject: { type: string }
                db: { type: string }

  /api/boot/prefetch:
    get:
      tags: [Admin]
      summary: Batch — fetch paralelo de endpoints core para hidratación rápida
      parameters:
        - in: query
          name: db
          schema: { type: string }

  # ──────────────────────── AI v3 (Opus 4.7 + tools + caching) ────────────────────
  /api/ai/chat-v3:
    post:
      tags: [AI]
      summary: Chat con AI v3 (Opus 4.7, 25 tools, prompt caching, adaptive thinking)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                sessionId: { type: string, description: "Persiste en sumi-db" }
                message: { type: string }
                db: { type: string, default: default }
                effort: { type: string, enum: [low, medium, high, max, xhigh], default: medium }
                imageBase64: { type: string, description: "Base64 de imagen (vision)" }
                mediaType: { type: string, default: image/png }
      responses:
        '200': { description: Respuesta con reply, usage tokens, tools usadas }
        '429': { description: Rate limit excedido (15/min/sesion) }
        '503': { description: ANTHROPIC_API_KEY no configurada }
  /api/ai/chat-v3/stream:
    post:
      tags: [AI]
      summary: Streaming SSE — typing-indicator en tiempo real para chat UIs
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                sessionId: { type: string }
                message: { type: string }
                db: { type: string }
                effort: { type: string }
      responses:
        '200':
          description: SSE stream con eventos start, text, tool_use, tool_result, end, error
          content:
            text/event-stream: {}
  /api/ai/chat-v3/sessions:
    get:
      tags: [AI]
      summary: Lista de sesiones persistidas (top 50, ordenadas por lastAt)
      responses: { '200': { description: OK } }
  /api/ai/chat-v3/sessions/{id}:
    delete:
      tags: [AI]
      summary: Borra una sesión
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses: { '200': { description: OK } }
  /api/ai/chat-v3/stats:
    get:
      tags: [AI]
      summary: Métricas de uso (tokens, cache hit rate, costo USD estimado)
      responses: { '200': { description: OK } }
  /api/ai/chat-v3/tools:
    get:
      tags: [AI]
      summary: Catálogo de tools disponibles para el AI
      responses: { '200': { description: OK } }

  # ──────────────────────── Health profundo ────────────────────────────────────
  /api/health/deep:
    get:
      tags: [Health]
      summary: Health check completo — version, AI, snapshots, crons, disk, memoria
      responses:
        '200': { description: Healthy/degraded }
        '503': { description: Unhealthy }
  /api/health/ready:
    get:
      tags: [Health]
      summary: Readiness probe (200 si snapshots cargados, 503 si no)
      responses: { '200': { description: Ready }, '503': { description: No snapshots } }
  /api/health/live:
    get:
      tags: [Health]
      summary: Liveness probe (200 mientras process esté vivo)
      responses: { '200': { description: Alive } }
  /api/cron/status:
    get:
      tags: [Health]
      summary: Estado de crons registrados (última ejecución, ranToday)
      responses: { '200': { description: OK } }

  # ──────────────────────── Métricas Prometheus ────────────────────────────────
  /api/metrics:
    get:
      tags: [Health]
      summary: Métricas formato Prometheus (text/plain version=0.0.4)
      responses:
        '200':
          description: Prometheus exposition format
          content:
            text/plain: {}

  # ──────────────────────── 11 módulos operativos (PR #3) ───────────────────────
  /api/churn/at-risk:
    get:
      tags: [Comercial]
      summary: Clientes en riesgo de fuga (score 0-100, monto en riesgo)
      parameters:
        - { in: query, name: db, schema: { type: string } }
        - { in: query, name: dias, schema: { type: integer, default: 60 } }
        - { in: query, name: limit, schema: { type: integer, default: 100 } }
      responses: { '200': { description: OK } }
  /api/churn/summary:
    get:
      tags: [Comercial]
      summary: Resumen de churn por segmento + top 5
      responses: { '200': { description: OK } }
  /api/churn/notify:
    post:
      tags: [Comercial]
      summary: Envía top N en riesgo por WhatsApp o Slack
      responses: { '200': { description: OK } }
  /api/compras/lista:
    get:
      tags: [Inventario]
      summary: Lista priorizada de compras (urgencia × valor)
      parameters:
        - { in: query, name: db, schema: { type: string } }
        - { in: query, name: lead, schema: { type: integer, default: 15 } }
      responses: { '200': { description: OK } }
  /api/compras/preview:
    get:
      tags: [Inventario]
      summary: HTML preview del reporte de compras
      responses: { '200': { description: HTML } }
  /api/compras/send:
    post:
      tags: [Inventario]
      summary: Envía reporte de compras manualmente
      responses: { '200': { description: OK } }
  /api/inv/abc-xyz:
    get:
      tags: [Inventario]
      summary: Clasificación ABC × XYZ con recomendación por celda
      responses: { '200': { description: OK } }
  /api/inv/reorden:
    get:
      tags: [Inventario]
      summary: Punto de reorden dinámico (ROP + EOQ + safety stock)
      responses: { '200': { description: OK } }
  /api/forecast/sku:
    get:
      tags: [Inventario]
      summary: Forecast mensual de un SKU específico
      responses: { '200': { description: OK } }
  /api/forecast/sku/batch:
    get:
      tags: [Inventario]
      summary: Forecast por top N SKUs (paralelo, pool de 8)
      responses: { '200': { description: OK } }
  /api/cxc/prob-pago:
    get:
      tags: [Cobranza]
      summary: Score 0-100 + grado A-D de probabilidad de pago por cliente
      responses: { '200': { description: OK } }
  /api/cxc/prob-pago/cliente:
    get:
      tags: [Cobranza]
      summary: Score detallado para un cliente
      responses: { '200': { description: OK } }
  /api/leads/scoring:
    get:
      tags: [Comercial]
      summary: Probabilidad de cierre por cotización abierta
      responses: { '200': { description: OK } }
  /api/leads/conversion-rates:
    get:
      tags: [Comercial]
      summary: Tasa histórica de conversión por vendedor
      responses: { '200': { description: OK } }
  /api/cross-sell/cliente:
    get:
      tags: [Comercial]
      summary: Productos recomendados para un cliente
      responses: { '200': { description: OK } }
  /api/cross-sell/articulo:
    get:
      tags: [Comercial]
      summary: Productos asociados (frecuentemente comprados juntos)
      responses: { '200': { description: OK } }
  /api/cross-sell/global:
    get:
      tags: [Comercial]
      summary: Reglas de asociación globales (market basket)
      responses: { '200': { description: OK } }
  /api/catalogos/duplicados/articulos:
    get:
      tags: [Regulatorio]
      summary: Artículos potencialmente duplicados
      responses: { '200': { description: OK } }
  /api/catalogos/duplicados/clientes:
    get:
      tags: [Regulatorio]
      summary: Clientes potencialmente duplicados
      responses: { '200': { description: OK } }
  /api/sat/diot:
    get:
      tags: [Regulatorio]
      summary: Pre-DIOT (no reemplaza validador SAT — solo conciliación)
      responses: { '200': { description: OK } }
  /api/wa/webhook:
    post:
      tags: [WhatsApp]
      summary: Webhook entrante de Twilio (firma HMAC validada)
      responses: { '200': { description: TwiML response } }
