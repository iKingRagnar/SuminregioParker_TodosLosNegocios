services:
  - type: web
    name: suminregioparker-todoslosnegocios
    runtime: node
    region: oregon
    plan: starter
    branch: main
    buildCommand: npm install
    startCommand: node server_api.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      # API externa centralizada: https://api.suminregio.com/api/external
      # La key real se configura desde el dashboard de Render (no se committea).
      - key: SUMINREGIO_API_KEY
        sync: false
      - key: SUMINREGIO_API_URL
        value: https://api.suminregio.com/api/external
      - key: DEFAULT_UNIDAD
        value: parker
      - key: CORS_ORIGIN
        value: "*"
      # Para activar basic auth en el dashboard:
      #   - key: AUTH_USERS
      #     sync: false   # valor: "guillermo:passSecreto;omar:otroPass"
      - key: RATE_LIMIT_MAX
        value: "300"
