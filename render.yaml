services:
  - type: web
    name: suminregioparker-todoslosnegocios
    runtime: node
    region: oregon
    plan: starter
    branch: main
    buildCommand: npm ci
    startCommand: node server_corregido.js
    healthCheckPath: /health
    disk:
      name: daily-cache
      mountPath: /var/data/cache
      sizeGB: 1
    envVars:
      - key: CACHE_MODE
        value: "1"
      - key: CACHE_DIR
        value: /var/data/cache
      - key: SUMI_DB_DIR
        value: /var/data/cache/sumi-db
      - key: NODE_VERSION
        value: "20"
      # TODO el proyecto SIN IVA: el código ya lo fuerza (sqlVentaImporteBaseExpr
      # usa siempre IMPORTE_NETO neto), pero lo declaramos en 0 para que NINGUNA
      # variable sume IVA. ⚠️ Si en el dashboard de Render existe esta misma variable
      # en "1", ESA gana sobre este archivo — hay que ponerla en 0 (o borrarla) allí.
      - key: MICROSIP_VENTAS_INCLUIR_IMPUESTOS
        value: "0"
