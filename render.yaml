services:
  - type: web
    name: suminregioparker-todoslosnegocios
    runtime: node
    region: oregon
    plan: starter
    branch: main
    buildCommand: npm ci
    startCommand: node server_corregido.js
    healthCheckPath: /health
    disk:
      name: daily-cache
      mountPath: /var/data/cache
      sizeGB: 1
    envVars:
      - key: CACHE_MODE
        value: "1"
      - key: CACHE_DIR
        value: /var/data/cache
      - key: SUMI_DB_DIR
        value: /var/data/cache/sumi-db
      - key: NODE_VERSION
        value: "20"
      # Todo el proyecto en base NETA (sin IVA) por default — cifras de ventas
      # = IMPORTE_NETO. NO poner en "1" (eso sumaría el IVA como en la UI Microsip).
      - key: MICROSIP_VENTAS_INCLUIR_IMPUESTOS
        value: "0"
